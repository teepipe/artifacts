function ub64(s){const bin=atob(s);const u=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function decrypt(password){
  const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),
    'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:ub64(PAYLOAD.salt),iterations:PAYLOAD.iter,hash:'SHA-256'},
    baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(PAYLOAD.iv)},key,ub64(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}
async function unlock(){
  const err=document.getElementById('err');err.textContent='';
  try{
    const html=await decrypt(document.getElementById('pw').value);
    const f=document.createElement('iframe');
    f.setAttribute('sandbox','allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms allow-modals');
    f.srcdoc=html;
    document.body.innerHTML='';
    document.body.appendChild(f);
  }catch(e){err.textContent='Incorrect password.';}
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
